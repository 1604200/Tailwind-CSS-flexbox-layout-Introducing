<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Virginia Regita Sari</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>

  <style>

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --pink-magenta: #e0148a;
      --cream: #fdf6ee;
      --warm-brown: #5c3d2e;
      --sepia: #8b6f47;
      --dark: #1a0f08;
      --card-bg: rgba(253, 246, 238, 0.76);
      --shadow: 0 12px 60px rgba(60, 20, 10, 0.35);
    }

    html, body {
      height: 100%;
      min-height: 100vh;
      font-family: 'Cormorant Garamond', serif;
      background: var(--dark);
      overflow-x: hidden;
    }

    /* ── GIF BACKGROUND ───────────────────────────── */
    .video-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .video-bg::before {
      content: '';
      position: absolute;
      inset: 0;

      background-image: url('./bg.gif');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      transform: scale(1.05);

      filter:
        sepia(35%)
        brightness(0.45)
        contrast(1.05)
        saturate(0.9);
    }

    /* color grade overlay — warm sepia vintage */
    .video-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        135deg,
        rgba(80, 40, 10, 0.52) 0%,
        rgba(30, 10, 5, 0.38) 50%,
        rgba(60, 20, 8, 0.55) 100%
      );
      mix-blend-mode: multiply;
    }

    /* grain texture */
    .grain {
      position: fixed;
      inset: 0;
      z-index: 1;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.5;
    }

    /* vignette */
    .vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: radial-gradient(
        ellipse at 50% 50%,
        transparent 35%,
        rgba(8, 3, 1, 0.78) 100%
      );
      pointer-events: none;
    }

    /* ── PAGE ───────────────────────────────────────── */
    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    /* ── CARD ───────────────────────────────────────── */
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(22px) saturate(1.5);
      -webkit-backdrop-filter: blur(22px) saturate(1.5);
      border: 1.5px solid rgba(255, 215, 170, 0.4);
      border-radius: 3px;
      padding: 3.5rem 3.2rem 2.8rem;
      max-width: 800px;
      width: 100%;
      box-shadow: var(--shadow), inset 0 0 0 1px rgba(255,255,255,0.09);
      position: relative;

      opacity: 0;
      transform: translateY(36px) scale(0.98);
      animation: fadeInCard 1.4s cubic-bezier(0.22, 1, 0.36, 1) 0.4s forwards;
    }

    /* corner ornaments */
    .card::before,
    .card::after {
      content: '';
      position: absolute;
      width: 56px;
      height: 56px;
      border-color: rgba(139,111,71,0.55);
      border-style: solid;
    }

    .card::before {
      top: 14px;
      left: 14px;
      border-width: 1.5px 0 0 1.5px;
    }

    .card::after {
      bottom: 14px;
      right: 14px;
      border-width: 0 1.5px 1.5px 0;
    }

    /* ── ORNAMENT ───────────────────────────────────── */
    .ornament {
      text-align: center;
      font-size: 0.75rem;
      letter-spacing: 0.55em;
      color: var(--sepia);
      opacity: 0.6;
      margin-bottom: 2rem;
      animation: fadeInCard 0.9s ease 1s forwards;
    }

    /* ── PROFILE ROW ────────────────────────────────── */
    .profile-row {
      display: flex;
      align-items: flex-start;
      gap: 2.6rem;
      opacity: 0;
      animation: fadeInCard 0.9s ease 1.1s forwards;
    }

    /* ── AVATAR ─────────────────────────────────────── */
    .avatar-wrap {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.55rem;
    }

    .avatar-ring {
      width: 158px;
      height: 158px;
      border-radius: 50%;
      padding: 4px;
      background: linear-gradient(
        135deg,
        #c9a87c,
        #e0148a 60%,
        #c9a87c
      );

      box-shadow:
        0 0 0 3px rgba(139,111,71,0.12),
        0 8px 36px rgba(80,20,10,0.35);

      transition:
        transform 0.55s cubic-bezier(0.34, 1.56, 0.64, 1),
        box-shadow 0.45s ease;

      cursor: pointer;
    }

    .avatar-ring:hover {
      transform: scale(1.1);

      box-shadow:
        0 0 0 6px rgba(224,20,138,0.18),
        0 14px 48px rgba(224,20,138,0.3);
    }

    .avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      background: #d4b896;
    }

    .avatar-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;

      transition:
        transform 0.55s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .avatar-ring:hover .avatar-inner img {
      transform: scale(1.15);
    }

    .avatar-label {
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--sepia);
      opacity: 0.7;
    }

    /* ── BIO ────────────────────────────────────────── */
    .bio {
      flex: 1;
      min-width: 0;
      padding-top: 0.2rem;
    }

    .bio-eyebrow {
      font-size: 0.78rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      font-style: italic;
      color: var(--sepia);
      opacity: 0.75;
      margin-bottom: 0.35rem;
    }

    .bio-name {
      font-family: 'Playfair Display', serif;
      font-size: 2.3rem;
      font-weight: 700;
      line-height: 1.1;
      color: var(--warm-brown);
    }

    .bio-name span {
      display: block;
      font-style: italic;
      font-weight: 400;
      font-size: 1.55rem;
      color: var(--sepia);
    }

    .rule {
      width: 50px;
      height: 1.5px;
      background: linear-gradient(
        90deg,
        var(--sepia),
        transparent
      );
      margin: 1rem 0;
    }

    .bio-detail {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      margin-bottom: 0.5rem;
    }

    .detail-key {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--sepia);
      opacity: 0.6;
      min-width: 78px;
      flex-shrink: 0;
    }

    .detail-val {
      font-size: 1.05rem;
      color: var(--warm-brown);
    }

    .vintage-tag {
      display: inline-block;
      border: 1px solid rgba(139,111,71,0.45);
      border-radius: 100px;
      padding: 0.18rem 0.8rem;
      font-size: 0.85rem;
      font-style: italic;
      color: var(--sepia);
      background: rgba(139,111,71,0.07);
    }

    /* ── SOCIAL ─────────────────────────────────────── */
    .social-row {
      margin-top: 1.6rem;
      display: flex;
      gap: 1.6rem;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeInCard 0.9s ease 1.3s forwards;
    }

    .social-link {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      font-family: 'Playfair Display', serif;
      font-size: 0.92rem;
      color: var(--pink-magenta);
      text-decoration: none;
      letter-spacing: 0.04em;
      position: relative;
      transition: color 0.25s, gap 0.3s;
    }

    .social-link::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -2px;
      width: 0;
      height: 1px;
      background: var(--pink-magenta);

      transition:
        width 0.3s cubic-bezier(0.22,1,0.36,1);
    }

    .social-link:hover {
      color: #c0006e;
      gap: 0.65rem;
    }

    .social-link:hover::after {
      width: 100%;
    }

    .social-icon {
      width: 15px;
      height: 15px;
      fill: currentColor;
      flex-shrink: 0;
    }

    /* ── FOOTER QUOTE ───────────────────────────────── */
    .footer-quote {
      margin-top: 2.4rem;
      padding-top: 1.4rem;
      border-top: 1px solid rgba(139,111,71,0.22);
      text-align: center;
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      color: var(--sepia);
      opacity: 0;
      animation: fadeInCard 0.9s ease 1.5s forwards;
    }

    /* ── KEYFRAMES ──────────────────────────────────── */
    @keyframes fadeInCard {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.99);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* ── RESPONSIVE ─────────────────────────────────── */
    @media (max-width: 560px) {

      .profile-row {
        flex-direction: column;
        align-items: center;
      }

      .bio {
        text-align: center;
      }

      .rule {
        margin: 1rem auto;
      }

      .bio-detail {
        flex-direction: column;
        align-items: center;
        gap: 0.1rem;
      }

      .social-row {
        justify-content: center;
      }

      .card {
        padding: 2.4rem 1.5rem 2rem;
      }

      .bio-name {
        font-size: 1.85rem;
      }
    }

  </style>
</head>
